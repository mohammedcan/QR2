<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Mesaj</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Syne+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111;
    --border: #222;
    --accent: #e8ff47;
    --text: #f0f0f0;
    --muted: #555;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 60px 60px;
    opacity: 0.35;
    pointer-events: none;
  }

  /* Glowing orb */
  body::after {
    content: '';
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(232,255,71,0.05) 0%, transparent 70%);
    pointer-events: none;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 600px;
    animation: appear 0.6s cubic-bezier(0.16, 1, 0.3, 1);
  }

  @keyframes appear {
    from { opacity: 0; transform: scale(0.95) translateY(20px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(232, 255, 71, 0.1);
    border: 1px solid rgba(232, 255, 71, 0.25);
    color: var(--accent);
    padding: 6px 14px;
    border-radius: 100px;
    font-family: 'Syne Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    margin-bottom: 24px;
  }

  .badge-dot {
    width: 6px;
    height: 6px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 40px;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: -1px; left: 20px; right: 20px;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
  }

  .qr-tag {
    font-family: 'Syne Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    margin-bottom: 20px;
  }

  .message-box {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px;
    position: relative;
    margin-bottom: 28px;
  }

  .message-box::before {
    content: '"';
    position: absolute;
    top: 10px;
    left: 20px;
    font-size: 4rem;
    color: var(--border);
    font-family: Georgia, serif;
    line-height: 1;
  }

  .message-text {
    font-size: clamp(1rem, 3vw, 1.3rem);
    line-height: 1.7;
    word-break: break-word;
    white-space: pre-wrap;
    padding-top: 20px;
    color: var(--text);
  }

  .meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
  }

  .created {
    font-family: 'Syne Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
  }

  .id-tag {
    font-family: 'Syne Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    background: var(--bg);
    border: 1px solid var(--border);
    padding: 4px 10px;
    border-radius: 100px;
  }

  .home-link {
    display: block;
    text-align: center;
    margin-top: 24px;
    color: var(--muted);
    text-decoration: none;
    font-family: 'Syne Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    transition: color 0.2s;
    padding: 12px;
    border: 1px dashed var(--border);
    border-radius: 10px;
  }

  .home-link:hover { color: var(--accent); border-color: var(--accent); }

  .copy-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    font-size: 0.75rem;
    padding: 6px 14px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .copy-btn:hover { border-color: var(--accent); color: var(--accent); }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--accent);
    color: var(--bg);
    padding: 12px 24px;
    border-radius: 100px;
    font-weight: 700;
    font-size: 0.85rem;
    transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    z-index: 100;
    font-family: 'Syne', sans-serif;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="wrapper">
  <div class="badge">
    <span class="badge-dot"></span>
    QR MESAJ OKUNDU
  </div>

  <div class="card">
    <div class="qr-tag">// şifreli mesaj açıldı</div>

    <div class="message-box">
      <div class="message-text">{{ text }}</div>
    </div>

    <div class="meta">
      <span class="created">
        {% if created_at %}
          {{ created_at[:10] }} · {{ created_at[11:16] }}
        {% endif %}
      </span>
      <div style="display:flex;gap:8px;align-items:center;">
        <span class="id-tag">#{{ entry_id }}</span>
        <button class="copy-btn" onclick="copyText()">Kopyala</button>
      </div>
    </div>
  </div>

  <a href="/" class="home-link">+ Sen de QR Mesaj oluştur</a>
</div>

<div class="toast" id="toast"></div>

<script>
function copyText() {
  const text = {{ text | tojson }};
  navigator.clipboard.writeText(text).then(() => showToast('Kopyalandı!'));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
</body>
</html>
